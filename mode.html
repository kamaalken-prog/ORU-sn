<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORU Mode | Street-Luxe</title>
    <style>
        :root { --neon: linear-gradient(135deg, #ff00ff, #00ffff); }
        body { background: #0a0a0a; color: white; font-family: 'Helvetica', sans-serif; padding: 20px; }
        .product-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--neon); color: black; font-weight: bold; cursor: pointer; margin-top: 10px; }
        h1 { background: var(--neon); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <h1>🛍️ Mode & Accessoires</h1>

    <div class="product-card">
        <h3>Sac Bandoulière Y2K</h3>
        <p>Catégorie : Accessoires | <b>15 000 FCFA</b></p>
        <p>Détails : Design minimaliste, cuir synthétique haute qualité.</p>
        <button onclick="alert('Redirection vers WhatsApp...')">Acheter via WhatsApp</button>
    </div>

    <hr style="border:0; border-top:1px solid #333; margin: 30px 0;">

    <h3>Ajouter un article</h3>
    <form id="add-mode-form">
        <input type="text" placeholder="Nom du produit" required>
        <select>
            <option>Catégorie : Vêtement</option>
            <option>Catégorie : Chaussure</option>
            <option>Catégorie : Accessoire</option>
        </select>
        <input type="number" placeholder="Prix (FCFA)" required>
        <input type="text" placeholder="Tailles disponibles (ex: M, L, 42)" required>
        <textarea placeholder="Description (matière, état, couleur...)"></textarea>
        <input type="tel" placeholder="Ton numéro WhatsApp" required>
        <button type="submit">Publier l'article</button>
    </form>

</body>
</html>
