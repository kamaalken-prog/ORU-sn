<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ORU Food & Kitchen</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        .product-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #00ffff; }
        .add-btn { background: var(--neon); padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; }
        .price { color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🍲 Food & Kitchen</h1>
    
    <div id="catalog">
        <div class="product-card">
            <h3>Jolof Rice Spécial</h3>
            <p>Qualité : Premium</p>
            <p class="price">2500 FCFA</p>
            <button>Commander</button>
        </div>
    </div>

    <hr>
    
    <h3>Vendre un plat ?</h3>
    <div class="add-btn" onclick="toggleForm()">Ajouter mon menu</div>
    
    <div id="form" style="display:none; margin-top:20px;">
        <input type="text" placeholder="Nom du plat"><br>
        <input type="number" placeholder="Prix"><br>
        <textarea placeholder="Détails du plat"></textarea><br>
        <button>Publier le menu</button>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('form').style.display = 'block';
        }
    </script>
</body>
</html>
